<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="light dark">
	<title>GMA Benchmark</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="data:," />
	<script src="../../importmap.js"></script>
	<script type="module" src="index.js"></script>
</head>
<body>
	<header>
		<hgroup>
			<h1>Gamut Mapping Benchmark</h1>
			<p class="intro">
				Each row is one GMA mapping a dense field of out-of-gamut OKLCh colors
				(hue&nbsp;→ across, lightness&nbsp;↓ down, chroma fixed at 0.4).
			</p>
		</hgroup>

		<form class="range-form">
			<fieldset>
				<legend>Hue °</legend>
				<label>min <input name="hMin" type="number" min="0" max="360" step="any" value="0"></label>
				<label>max <input name="hMax" type="number" min="0" max="360" step="any" value="359"></label>
				<label>step <input name="hStep" type="number" min="0" step="any" value="1"></label>
			</fieldset>
			<fieldset>
				<legend>Lightness</legend>
				<label>min <input name="lMin" type="number" min="0" max="1" step="any" value="0.01"></label>
				<label>max <input name="lMax" type="number" min="0" max="1" step="any" value="0.99"></label>
				<label>step <input name="lStep" type="number" min="0" step="any" value="0.01"></label>
			</fieldset>
			<button type="submit">
				Go
				<output class="colors-count"></output>
			</button>
		</form>

		<div class="run-controls">
			<progress id="progress" value="0" max="1"></progress>
			<span id="status"></span>
			<button id="toggle" type="button">Pause</button>
		</div>
		<div class="view-controls" id="view-controls"></div>
	</header>

	<aside id="inspector" class="inspector"></aside>

	<div id="fields" class="fields"></div>
</body>
</html>

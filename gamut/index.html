<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>OKLCH Gamut Wheel</title>
	<script src="../importmap.js"></script>
	<script src="index.js" type="module"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main>
		<div class="controls">
			<color-picker space="oklch" :color="pickerColor" @colorchange="onColorChange"></color-picker>
			<div class="meta">
				<label class="gamut">
					Gamut:
					<select v-model="gamut">
						<option value="srgb">sRGB</option>
						<option value="p3">P3</option>
						<option value="rec2020">Rec2020</option>
					</select>
				</label>
				<label class="oog-mode">
					<input type="checkbox" v-model="paintOOG"> Paint out of gamut colors
				</label>
			</div>
		</div>

		<div class="wheel-wrap" ref="wheel"
			:class="{ dragging }"
			:data-paint-oog="paintOOG"
			@pointerdown="onPointerDown"
			@pointermove="onPointerMove"
			@pointerup="onPointerUp"
			@pointercancel="onPointerUp"
			:style="{
			'--size': cssSize + 'px',
			'--max-c': maxChroma,
			'--l': lightness,
			'--gamut-shape': gamutShape,
		}">
			<div class="layers">
				<div v-for="layer in layers" :key="layer.idx" class="layer"
					:style="{ '--c': layer.c }"></div>
			</div>

			<template v-for="c in chromaTicks" :key="c">
				<div class="tick-ring" :style="{ '--tick-c': c }" aria-hidden="true"></div>
				<div class="tick-label" :style="{ '--tick-c': c }" aria-hidden="true">{{ c }}</div>
			</template>

			<div class="marker" :style="{
				'--marker-c': markerC,
				'--marker-h': markerH + 'deg',
			}" aria-hidden="true"></div>

			<div v-if="paintOOG" class="boundary" aria-hidden="true"></div>

			<div class="hue-labels" aria-hidden="true">
				<span style="--angle: 0deg">h=0°</span>
				<span style="--angle: 90deg">h=90°</span>
				<span style="--angle: 180deg">h=180°</span>
				<span style="--angle: 270deg">h=270°</span>
			</div>
		</div>
	</main>
</body>
</html>

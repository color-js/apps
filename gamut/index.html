<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>OKLCH Gamut Wheel</title>
	<script src="../importmap.js"></script>
	<script src="index.js" type="module"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
		<h1>OKLCH Gamut Wheel</h1>
		<p>Slice of the P3 gamut at the picked lightness.
			Hue runs around the wheel; <strong>distance from the center is chroma</strong>
			(0 at the center, {{ maxChroma }} at the edge).
			Grey = out of gamut.</p>
	</header>

	<main>
		<color-picker space="oklch" color="oklch(0.5 0.2 240)" @colorchange="onColorChange"></color-picker>

		<div class="wheel-wrap" :style="{
			'--size': cssSize + 'px',
			'--max-c': maxChroma,
			'--l': lightness,
		}">
			<div class="layers" :style="{ 'clip-path': clipPath }">
				<div v-for="layer in layers" :key="layer.idx" class="layer"
					:style="{ '--c': layer.c }"></div>
			</div>

			<template v-for="c in chromaTicks" :key="c">
				<div class="tick-ring" :style="{ '--tick-c': c }" aria-hidden="true"></div>
				<div class="tick-label" :style="{ '--tick-c': c }" aria-hidden="true">{{ c }}</div>
			</template>

			<div class="marker" :style="{
				'--marker-c': markerC,
				'--marker-h': markerH + 'deg',
			}" aria-hidden="true"></div>

			<div class="hue-labels" aria-hidden="true">
				<span style="--angle: 0deg">h=0°</span>
				<span style="--angle: 90deg">h=90°</span>
				<span style="--angle: 180deg">h=180°</span>
				<span style="--angle: 270deg">h=270°</span>
			</div>
		</div>
	</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>OKLCH Gamut Wheel</title>
	<script src="../importmap.js"></script>
	<script src="index.js" type="module"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main>
		<div class="controls">
			<color-picker space="oklch" :color="pickerColor" @colorchange="onColorChange"></color-picker>
			<div class="meta">
				<div class="setting">
					Paint colors in:
					<label v-for="opt in paintOptions" :key="opt.value">
						<input type="radio" name="paint-gamut" :value="opt.value"
							:checked="paintGamut === opt.value" @change="paintGamut = opt.value">
						{{ opt.label }}
					</label>
				</div>
				<div class="setting">
					Show gamut:
					<label v-for="opt in showOptions" :key="opt.value"
						:class="{ disabled: paintGamut === opt.value }">
						<input type="checkbox" v-model="shownGamuts[opt.value]"
							:disabled="paintGamut === opt.value">
						{{ opt.label }}
					</label>
				</div>
			</div>
		</div>

		<div class="wheel-wrap" ref="wheel"
			:class="{ dragging }"
			@pointerdown="onPointerDown"
			@pointermove="onPointerMove"
			@pointerup="onPointerUp"
			@pointercancel="onPointerUp"
			:style="{
				'--max-c': maxChroma,
				'--l': lightness,
				'--clip': layerClip,
			}">
			<div class="layers">
				<div v-for="layer in layers" :key="layer.idx" class="layer"
					:style="{ '--c': layer.c }"></div>
			</div>

			<div v-for="ring in tickRings" :key="ring.key"
				:class="['tick', 'tick-' + ring.key]"
				:style="{ '--tick-c': ring.c }"
				:data-label="ring.c.toFixed(2)" aria-hidden="true"></div>

			<div class="marker" :style="{
				'--marker-c': markerC,
				'--marker-h': markerH + 'deg',
			}" aria-hidden="true"></div>

			<div v-for="opt in shownList" :key="opt.value" class="outline"
				:style="{ '--shape': `var(--shape-${opt.value})` }"
				aria-hidden="true"></div>

			<div class="hue-labels" aria-hidden="true">
				<span style="--angle: 0deg">h=0°</span>
				<span style="--angle: 90deg">h=90°</span>
				<span style="--angle: 180deg">h=180°</span>
				<span style="--angle: 270deg">h=270°</span>
			</div>
		</div>
	</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<script src="../importmap.js"></script>
	<script src="index.js" type="module"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<section id="params">
	<label><input type="checkbox" switch v-model="darkMode"> Dark mode</label>
	<color-picker id="input" space="oklch" color="oklch(70% 0.16 205)" @colorchange="onColorChange"></color-picker>
	</section>
	<section id="scales">
		<h2>Generated color scales</h2>
		<article v-for="scale in allScales" :key="scale.id" class="scale" :class="{ combo: scale.isCombo }" :id="'scale_' + scale.id" :style="scale.cssVars">
			<h3>
				<label v-if="!scale.isCombo"><input type="checkbox" :checked="selected[scale.id]" @change="toggleScale(scale.id)"> {{ scale.name }}</label>
				<template v-else>{{ scale.name }}</template>
				<label v-if="!scale.isCombo && selected[scale.id] && selectedScales.length >= 2" class="weight-slider">
					<input type="range" min="0" max="100" v-model.number="selected[scale.id].weight">
					<output>{{ normalizedWeights[scale.id] }}%</output>
				</label>
			</h3>
			<color-scale space="oklch" :colors.prop="scale.tints"></color-scale>
			<div class="callout">
				<div class="h2">Heading</div>
				<p>Paragraph</p>
			</div>
		</article>
	</section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Color ramps</title>
	<script src="../importmap.js"></script>
	<script src="index.js" type="module"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<section id="params">
	<label><input type="checkbox" switch v-model="darkMode"> Dark mode</label>
	<color-picker ref="input" id="input" space="oklch-p3" :color="initialColor" @colorchange="onColorChange"></color-picker>
	<div class="swatches">
		<button v-for="(value, name) in swatches" :key="name" :style="{ '--swatch': value }" :title="name" @click="pickSwatch(value)"></button>
	</div>
	</section>
	<section id="scales">
		<h2>Generated color scales</h2>
		<article v-for="scale in allScales" :key="scale.id" class="scale" :class="{ combo: scale.isCombo }" :id="'scale_' + scale.id" :style="scale.cssVars">
			<h3>
				<label v-if="!scale.isCombo"><input type="checkbox" :checked="scale.id in selected" @change="toggleScale(scale.id)"> {{ scale.name }}</label>
				<template v-else>{{ scale.name }}</template>
				<label v-if="!scale.isCombo && scale.id in selected && selectedScales.length >= 2" class="weight-slider">
					<input type="range" min="0" max="100" :value="normalizedWeights[scale.id]" @input="setWeight(scale.id, $event.target.valueAsNumber)">
					<output>{{ normalizedWeights[scale.id] }}%</output>
				</label>
				<code v-if="!scale.isCombo" class="scale-id" title="Use as a ?scales= value in the URL">{{ scale.id }}</code>
			</h3>
			<color-scale space="oklch" :colors.prop="scale.tints"></color-scale>
			<div class="callout">
				<div class="h2">Heading</div>
				<p>Paragraph</p>
			</div>
		</article>
	</section>
</body>
</html>
